name: Update ORCID Publications
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  update-orcid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Fix per il warning di Node.js 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Fetch and Update README
        shell: python
        run: |
          import urllib.request, json, os
          
          ORCID_ID = "0009-0001-3968-0395"
          URL = f"https://pub.orcid.org/v3.0/{ORCID_ID}/works"
          START, END = "", ""
          
          print(f"📡 Recupero dati per ORCID: {ORCID_ID}...")
          
          try:
              req = urllib.request.Request(URL, headers={"Accept": "application/json"})
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read().decode())
              
              works = data.get('group', [])
              print(f"✅ Trovate {len(works)} pubblicazioni.")
              
              lines = []
              for g in works[:5]:
                  s = g['work-summary'][0]
                  t = s['title']['title']['value']
                  y = s.get('publication-date', {}).get('year', {}).get('value', 'N/A')
                  lines.append(f"- **{t}** ({y})")
              
              content = "\n" + "\n".join(lines) + "\n"
              
              with open("README.md", "r", encoding="utf-8") as f:
                  readme = f.read()
              
              # Se i tag mancano, li aggiunge forzatamente sotto il titolo delle pubblicazioni
              if START not in readme:
                  print("⚠️ Tag mancanti, provo a inserirli dopo il titolo...")
                  anchor = "## 📚 Recent Publications"
                  if anchor in readme:
                      readme = readme.replace(anchor, f"{anchor}\n{START}\n{END}")
                  else:
                      print("❌ Titolo '## 📚 Recent Publications' non trovato!")
                      exit(1)

              parts = readme.split(START)
              after = parts[1].split(END)[1]
              
              final_readme = parts[0] + START + content + END + after
              
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(final_readme)
              print("🚀 README aggiornato localmente.")
                  
          except Exception as e:
              print(f"💥 Errore durante l'esecuzione: {e}")
              exit(1)

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update publications" || echo "Nessuna modifica da committare"
          git push
