name: Update ORCID Publications
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
jobs:
  update-orcid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and Update
        shell: python
        run: |
          import urllib.request, json, os
          ORCID_ID = "0009-0001-3968-0395"
          URL = f"https://pub.orcid.org/v3.0/{ORCID_ID}/works"
          START, END = "", ""
          try:
              req = urllib.request.Request(URL, headers={"Accept": "application/json"})
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read().decode())
              lines = []
              for g in data.get('group', [])[:5]:
                  s = g['work-summary'][0]
                  t = s['title']['title']['value']
                  y = s.get('publication-date', {}).get('year', {}).get('value', 'N/A')
                  lines.append(f"- **{t}** ({y})")
              content = "\n" + "\n".join(lines) + "\n"
              with open("README.md", "r", encoding="utf-8") as f:
                  readme = f.read()
              # Se i tag mancano, li aggiunge sotto il titolo
              if START not in readme:
                  readme = readme.replace("## 📚 Recent Publications", f"## 📚 Recent Publications\n{START}\n{END}")
              
              parts = readme.split(START)
              after = parts[1].split(END)[1]
              with open("README.md", "w", encoding="utf-8") as f:
                  f.write(parts[0] + START + content + END + after)
          except Exception as e:
              print(f"Errore: {e}")
              exit(1)
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update publications" || exit 0
          git push
